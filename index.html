<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>六轉核心進度計算器</title>
<link rel="icon" type="image/png" href="favicon.ico">
<!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container py-4 app-container">

  <header class="mb-3">
    <h1 class="h4 fw-bold mb-1">六轉核心進度計算器</h1>
    <p class="text-muted small mb-0">點擊星盤上的任一核心，輸入 0～30 等級，即時計算累積消耗與畢業進度</p>
  </header>

  <div class="card shadow-sm mb-3 hexa-plate-card">
    <div class="card-body text-center">
      <h2 class="h6 text-uppercase fw-bold hexa-card-title mb-3">六轉星盤</h2>

      <div class="d-flex justify-content-center">
        <div class="hexa-plate" id="hexaPlateElement">
          <div class="hex-divider d-tl"></div>
          <div class="hex-divider d-tr"></div>
          <div class="hex-divider d-bl"></div>
          <div class="hex-divider d-br"></div>
          <div class="hex-hub">Ⅵ</div>
          <!-- 六角格由 script.js 動態產生 -->
        </div>
      </div>

      <div class="hexa-legend d-flex flex-wrap justify-content-center gap-2 mt-3">
        <span class="badge rounded-pill hexa-badge hexa-badge-skill">Skill</span>
        <span class="badge rounded-pill hexa-badge hexa-badge-mastery">Mastery</span>
        <span class="badge rounded-pill hexa-badge hexa-badge-boost">Boost</span>
        <span class="badge rounded-pill hexa-badge hexa-badge-common">Common</span>
        <span class="badge rounded-pill hexa-badge hexa-badge-locked">🔒 未開放</span>
      </div>
      <div class="form-text mt-2">點擊六角格即可輸入 / 修改等級</div>
    </div>
  </div>

  <div class="row g-3 mb-3">
    <div class="col-12 col-md-6">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <h2 class="h6 text-uppercase fw-bold text-center progress-card-title mb-3">核心合計進度</h2>
          <div id="overallProgressContainer"></div>
        </div>
      </div>
    </div>
    <div class="col-12 col-md-6">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <h2 class="h6 text-uppercase fw-bold text-center progress-card-title mb-3">核心畢業進度（不含 Janus）</h2>
          <p class="text-muted small text-center mb-3">此區塊排除 Janus 目前已消耗與滿等所需的 Sol Erda / Fragment，調整 Janus 等級不會影響這裡的數字</p>
          <div id="excludingJanusProgressContainer"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="d-flex flex-wrap justify-content-center gap-2 mb-4">
    <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#exportDataModal" id="openExportModalButton">匯出資料</button>
    <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#importDataModal" id="openImportModalButton">匯入資料</button>
    <button type="button" class="btn btn-danger btn-sm" id="resetAllCoresButton">重設全部核心</button>
  </div>

</div>

<!-- 匯出資料 Modal -->
<div class="modal fade" id="exportDataModal" tabindex="-1" aria-labelledby="exportDataModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exportDataModalLabel">匯出資料</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="small text-muted">複製以下 JSON 內容自行保存，或直接下載成檔案備份。</p>
        <textarea id="exportedJsonTextarea" class="form-control font-monospace small" rows="10" readonly></textarea>
        <div id="copyFeedbackText" class="form-text text-success mt-1 d-none">已複製到剪貼簿</div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary btn-sm" id="copyExportedJsonButton">複製到剪貼簿</button>
        <button type="button" class="btn btn-primary btn-sm" id="downloadExportedJsonButton">下載 .json 檔案</button>
      </div>
    </div>
  </div>
</div>

<!-- 匯入資料 Modal -->
<div class="modal fade" id="importDataModal" tabindex="-1" aria-labelledby="importDataModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="importDataModalLabel">匯入資料</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="small text-muted">貼上先前匯出的 JSON 內容：</p>
        <textarea id="importJsonTextarea" class="form-control font-monospace small" rows="10" placeholder='{"coreLevels": {"skill1": 12, "mastery1": 30, ...}}'></textarea>
        <div id="importErrorAlert" class="alert alert-danger mt-2 py-2 small d-none"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary btn-sm" id="confirmImportButton">確認匯入</button>
      </div>
    </div>
  </div>
</div>

<!-- 六角格點擊編輯用的微型輸入框（由 script.js 動態插入定位） -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
