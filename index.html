<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<link rel="icon" type="image/png" href="favicon.ico">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>六轉核心進度計算器</title>
<style>
  :root {
    --ink: #1c2230;
    --panel: #ffffff;
    --page: #eef0f4;
    --line: #d7dae2;
    --gold: #b8862f;
    --gold-deep: #7a5a1e;
    --violet: #6c4fa0;
    --teal: #1d6e63;
    --muted: #6b7280;

    /* 象限主題色（依附件六角格配色） */
    --skill: #8b5fc9;
    --skill-deep: #5f3d94;
    --mastery: #c2447e;
    --mastery-deep: #8f2f5c;
    --boost: #2fa3c9;
    --boost-deep: #1c7896;
    --common: #8a93a4;
    --common-deep: #5d6674;

    /* 危險色（重設用） */
    --danger: #c0392b;
    --danger-deep: #922b21;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--page);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    padding: 24px 16px 40px;
  }
  .wrap { max-width: 960px; margin: 0 auto; }
  header { margin-bottom: 18px; }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 13px; }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 14px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--gold-deep);
    margin: 0 0 12px; display: flex; align-items: center; gap: 8px;
  }
  .card h2::before {
    content: ''; width: 4px; height: 14px; background: var(--gold);
    border-radius: 2px; display: inline-block;
  }

  input[type="number"] {
    padding: 6px 8px; border: 1px solid var(--line); border-radius: 6px;
    font-size: 13px; color: var(--ink); background: #fafbfc;
    width: 100%; font-variant-numeric: tabular-nums;
  }
  input:focus { outline: none; border-color: var(--gold); background: #fff; }

  .field label {
    display: block; font-size: 12px; color: var(--muted);
    margin-bottom: 6px; font-weight: 600;
  }

  .level-hero { display: flex; align-items: baseline; gap: 10px; margin: 8px 0 4px; }
  .level-hero .num {
    font-size: 22px; font-weight: 800; color: var(--gold-deep);
    font-variant-numeric: tabular-nums; line-height: 1;
  }
  .grad-note { font-size: 12px; color: var(--muted); }
  .grad-note b { color: var(--teal); }

  .progress-block { margin-bottom: 10px; }
  .progress-block:last-child { margin-bottom: 0; }
  .progress-top {
    display: flex; justify-content: space-between; font-size: 11px;
    color: var(--muted); margin-bottom: 4px; gap: 8px; flex-wrap: wrap;
  }
  .progress-top .res-name { display: flex; align-items: center; gap: 5px; }
  .progress-top .res-name .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .progress-top .amt { font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }
  .bar-track { height: 12px; background: #eceef2; border-radius: 999px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 999px; transition: width 0.35s ease; }
  .bar-fill.gold { background: linear-gradient(90deg, var(--gold), #d9a94a); }
  .bar-fill.violet { background: linear-gradient(90deg, var(--violet), #9077bd); }
  .bar-fill.teal { background: linear-gradient(90deg, var(--teal), #2c8f80); }
  .bar-pct {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    font-size: 9px; font-weight: 700; color: #fff; text-shadow: 0 0 2px rgba(0,0,0,0.3);
  }

  .save-hint { font-size: 11px; color: var(--muted); text-align: right; margin-top: -4px; margin-bottom: 12px; min-height: 14px; }

  .summary-card { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--line); }
  .summary-item .num { font-size: 20px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .summary-item.se .num { color: var(--gold-deep); }
  .summary-item.frag .num { color: var(--violet); }
  .summary-item.overall .num { color: var(--teal); }
  .summary-item .lbl { font-size: 11px; color: var(--muted); }

  /* Flexbox 四欄佈局，允許換行 */
  .quadrant-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
  }
  .quadrant {
    flex: 1 1 220px;
    min-width: 220px;
    border: 1px solid var(--line);
    border-top: 3px solid var(--line);
    border-radius: 10px;
    padding: 12px;
    background: #fbfbfc;
  }
  .quadrant.skill    { border-top-color: var(--skill); }
  .quadrant.mastery  { border-top-color: var(--mastery); }
  .quadrant.boost    { border-top-color: var(--boost); }
  .quadrant.common   { border-top-color: var(--common); }

  .quadrant-title {
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .quadrant.skill   .quadrant-title { color: var(--skill-deep); }
  .quadrant.mastery .quadrant-title { color: var(--mastery-deep); }
  .quadrant.boost   .quadrant-title { color: var(--boost-deep); }
  .quadrant.common  .quadrant-title { color: var(--common-deep); }

  .core-card {
    border: 1px solid var(--line);
    border-left: 3px solid var(--line);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
    background: #fff;
  }
  .core-card:last-child { margin-bottom: 0; }
  .quadrant.skill   .core-card { border-left-color: var(--skill); }
  .quadrant.mastery .core-card { border-left-color: var(--mastery); }
  .quadrant.boost   .core-card { border-left-color: var(--boost); }
  .quadrant.common  .core-card { border-left-color: var(--common); }

  .core-title {
    font-weight: 700;
    font-size: 13px;
    margin-bottom: 6px;
  }
  .level-input { max-width: 120px; }

  /* 底部合計進度區 */
  .global-progress-card { max-width: 480px; margin: 0 auto; }
  .global-progress-card h2 { justify-content: center; }
  .global-progress-card h2::before { display: none; }

  .reset-area { text-align: center; margin-top: 4px; }
  .btn-danger {
    background: var(--danger);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.2s ease;
  }
  .btn-danger:hover { background: var(--danger-deep); }
  .btn-danger:active { transform: translateY(1px); }

  @media (max-width: 700px) {
    .quadrant { flex: 1 1 calc(50% - 7px); min-width: 150px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>六轉核心進度計算器</h1>
    <div class="sub">輸入各核心當前等級（0～30），自動計算累積消耗與畢業進度</div>
  </header>

  <div class="save-hint" id="save-hint">&nbsp;</div>

  <div class="card">
    <h2>我的六轉核心</h2>
    <div class="summary-card" id="summary-area"></div>

    <div class="quadrant-grid">
      <div class="quadrant skill">
        <div class="quadrant-title">Skill Node</div>
        <div id="cores-tl"></div>
      </div>
      <div class="quadrant mastery">
        <div class="quadrant-title">Mastery Node</div>
        <div id="cores-tr"></div>
      </div>
      <div class="quadrant boost">
        <div class="quadrant-title">Boost Node</div>
        <div id="cores-bl"></div>
      </div>
      <div class="quadrant common">
        <div class="quadrant-title">Common Node</div>
        <div id="cores-br"></div>
      </div>
    </div>
  </div>

  <div class="card global-progress-card">
    <h2>核心合計進度</h2>
    <div id="global-progress-bars"></div>
  </div>

  <div class="reset-area">
    <button type="button" id="reset-btn" class="btn-danger">重設全部核心</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'hexa-core-tracker-v2';
const MAX_LEVEL = 30;

const hexaData = {

    { lvl: "9->10", erda: 10, frag: 200 }, { lvl: "10->11", erda: 3, frag: 80 }, { lvl: "11->12", erda: 3, frag: 90 },

    { lvl: "15->16", erda: 4, frag: 130 }, { lvl: "16->17", erda: 4, frag: 140 }, { lvl: "17->18", erda: 4, frag: 150 },
    { lvl: "18->19", erda: 5, frag: 160 }, { lvl: "19->20", erda: 15, frag: 350 }, { lvl: "20->21", erda: 5, frag: 170 },
    { lvl: "21->22", erda: 5, frag: 180 }, { lvl: "22->23", erda: 5, frag: 190 }, { lvl: "23->24", erda: 5, frag: 200 },
    { lvl: "24->25", erda: 5, frag: 210 }, { lvl: "25->26", erda: 6, frag: 220 }, { lvl: "26->27", erda: 6, frag: 230 },

  ],
  "mastery node": [
    { lvl: "0->1", erda: 3, frag: 50 }, { lvl: "1->2", erda: 1, frag: 15 }, { lvl: "2->3", erda: 1, frag: 18 },
    { lvl: "3->4", erda: 1, frag: 20 }, { lvl: "4->5", erda: 1, frag: 23 }, { lvl: "5->6", erda: 1, frag: 25 },
    { lvl: "6->7", erda: 1, frag: 28 }, { lvl: "7->8", erda: 2, frag: 30 }, { lvl: "8->9", erda: 2, frag: 33 },
    { lvl: "9->10", erda: 5, frag: 100 }, { lvl: "10->11", erda: 2, frag: 40 }, { lvl: "11->12", erda: 2, frag: 45 },
    { lvl: "12->13", erda: 2, frag: 50 }, { lvl: "13->14", erda: 2, frag: 55 }, { lvl: "14->15", erda: 2, frag: 60 },
    { lvl: "15->16", erda: 2, frag: 65 }, { lvl: "16->17", erda: 2, frag: 70 }, { lvl: "17->18", erda: 2, frag: 75 },
    { lvl: "18->19", erda: 3, frag: 80 }, { lvl: "19->20", erda: 8, frag: 175 }, { lvl: "20->21", erda: 3, frag: 85 },
    { lvl: "21->22", erda: 3, frag: 90 }, { lvl: "22->23", erda: 3, frag: 95 }, { lvl: "23->24", erda: 3, frag: 100 },
    { lvl: "24->25", erda: 3, frag: 105 }, { lvl: "25->26", erda: 3, frag: 110 }, { lvl: "26->27", erda: 3, frag: 115 },
    { lvl: "27->28", erda: 3, frag: 120 }, { lvl: "28->29", erda: 4, frag: 125 }, { lvl: "29->30", erda: 10, frag: 250 }
  ],
  "boost node": [
    { lvl: "0->1", erda: 4, frag: 75 }, { lvl: "1->2", erda: 1, frag: 23 }, { lvl: "2->3", erda: 1, frag: 27 },
    { lvl: "3->4", erda: 1, frag: 30 }, { lvl: "4->5", erda: 2, frag: 34 }, { lvl: "5->6", erda: 2, frag: 38 },
    { lvl: "6->7", erda: 2, frag: 42 }, { lvl: "7->8", erda: 3, frag: 45 }, { lvl: "8->9", erda: 3, frag: 49 },
    { lvl: "9->10", erda: 8, frag: 150 }, { lvl: "10->11", erda: 3, frag: 60 }, { lvl: "11->12", erda: 3, frag: 68 },
    { lvl: "12->13", erda: 3, frag: 75 }, { lvl: "13->14", erda: 3, frag: 83 }, { lvl: "14->15", erda: 3, frag: 90 },
    { lvl: "15->16", erda: 3, frag: 98 }, { lvl: "16->17", erda: 3, frag: 105 }, { lvl: "17->18", erda: 3, frag: 113 },
    { lvl: "18->19", erda: 4, frag: 120 }, { lvl: "19->20", erda: 12, frag: 263 }, { lvl: "20->21", erda: 4, frag: 128 },
    { lvl: "21->22", erda: 4, frag: 135 }, { lvl: "22->23", erda: 4, frag: 143 }, { lvl: "23->24", erda: 4, frag: 150 },
    { lvl: "24->25", erda: 4, frag: 158 }, { lvl: "25->26", erda: 5, frag: 165 }, { lvl: "26->27", erda: 5, frag: 173 },
    { lvl: "27->28", erda: 5, frag: 180 }, { lvl: "28->29", erda: 6, frag: 188 }, { lvl: "29->30", erda: 15, frag: 375 }
  ],
  "common node": [
    { lvl: "0->1", erda: 7, frag: 125 }, { lvl: "1->2", erda: 2, frag: 38 }, { lvl: "2->3", erda: 2, frag: 44 },
    { lvl: "3->4", erda: 2, frag: 50 }, { lvl: "4->5", erda: 3, frag: 57 }, { lvl: "5->6", erda: 3, frag: 63 },
    { lvl: "6->7", erda: 3, frag: 69 }, { lvl: "7->8", erda: 5, frag: 75 }, { lvl: "8->9", erda: 5, frag: 82 },
    { lvl: "9->10", erda: 14, frag: 300 }, { lvl: "10->11", erda: 5, frag: 110 }, { lvl: "11->12", erda: 5, frag: 124 },
    { lvl: "12->13", erda: 6, frag: 138 }, { lvl: "13->14", erda: 6, frag: 152 }, { lvl: "14->15", erda: 6, frag: 165 },
    { lvl: "15->16", erda: 6, frag: 179 }, { lvl: "16->17", erda: 6, frag: 193 }, { lvl: "17->18", erda: 6, frag: 207 },
    { lvl: "18->19", erda: 7, frag: 220 }, { lvl: "19->20", erda: 17, frag: 525 }, { lvl: "20->21", erda: 7, frag: 234 },
    { lvl: "21->22", erda: 7, frag: 248 }, { lvl: "22->23", erda: 7, frag: 262 }, { lvl: "23->24", erda: 7, frag: 275 },
    { lvl: "24->25", erda: 7, frag: 289 }, { lvl: "25->26", erda: 9, frag: 303 }, { lvl: "26->27", erda: 9, frag: 317 },
    { lvl: "27->28", erda: 9, frag: 330 }, { lvl: "28->29", erda: 10, frag: 344 }, { lvl: "29->30", erda: 20, frag: 750 }
  ]
};

// approach A：這次不新增 skill3 / common3，資料結構維持不變，STORAGE_KEY 也維持 v2
const CORE_LAYOUT = [
  { id: 'skill1',   name: 'Skill Node 1',   type: 'skill node',   quadrant: 'tl' },
  { id: 'skill2',   name: 'Skill Node 2',   type: 'skill node',   quadrant: 'tl' },
  { id: 'mastery1', name: 'Mastery Node 1', type: 'mastery node', quadrant: 'tr' },
  { id: 'mastery2', name: 'Mastery Node 2', type: 'mastery node', quadrant: 'tr' },
  { id: 'mastery3', name: 'Mastery Node 3', type: 'mastery node', quadrant: 'tr' },
  { id: 'mastery4', name: 'Mastery Node 4', type: 'mastery node', quadrant: 'tr' },
  { id: 'boost1',   name: 'Boost Node 1',   type: 'boost node',   quadrant: 'bl' },
  { id: 'boost2',   name: 'Boost Node 2',   type: 'boost node',   quadrant: 'bl' },
  { id: 'boost3',   name: 'Boost Node 3',   type: 'boost node',   quadrant: 'bl' },
  { id: 'boost4',   name: 'Boost Node 4',   type: 'boost node',   quadrant: 'bl' },
  { id: 'common1',  name: 'Common Node 1',  type: 'common node',  quadrant: 'br' },
  { id: 'common2',  name: 'Common Node 2',  type: 'common node',  quadrant: 'br' },
];

let coreLevels = {};
let saveTimer = null;
const saveHint = document.getElementById('save-hint');

const maxCostCache = {};
Object.keys(hexaData).forEach(type => {
  maxCostCache[type] = cumulativeCost(type, MAX_LEVEL);
});

function fmt(n) {
  return Math.max(0, Math.round(n)).toLocaleString('zh-Hant-TW');
}

function clampLevel(v) {
  return Math.max(0, Math.min(MAX_LEVEL, v));
}

function cumulativeCost(nodeType, currentLevel) {
  const rows = hexaData[nodeType];
  const lvl = clampLevel(currentLevel);
  let erda = 0, frag = 0;
  for (let i = 0; i < lvl; i++) {
    erda += rows[i].erda;
    frag += rows[i].frag;
  }
  return { erda, frag };
}

function graduationPct(nodeType, currentLevel) {
  const used = cumulativeCost(nodeType, currentLevel);
  const max = maxCostCache[nodeType];
  const totalUsed = used.erda + used.frag;
  const totalMax = max.erda + max.frag;
  return {
    overallPct: totalMax > 0 ? (totalUsed / totalMax) * 100 : 100,
    used,
    max
  };
}

// 只用於底部合計進度條
function globalBarBlock(name, dotColor, barClass, pct, detailText) {
  const clamped = Math.min(100, Math.max(0, pct));
  return `<div class="progress-block">
    <div class="progress-top">
      <span class="res-name"><span class="dot" style="background:${dotColor};"></span>${name}</span>
      <span class="amt">${detailText}</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill ${barClass}" style="width:${clamped}%;"></div>
      <span class="bar-pct">${clamped.toFixed(1)}%</span>
    </div>
  </div>`;
}

function coreResultHtml(type, level) {
  const result = graduationPct(type, level);
  return `<div class="level-hero"><span class="num">Lv. ${level}</span></div>
    <div class="grad-note">畢業進度：<b>${result.overallPct.toFixed(1)}%</b></div>`;
}

// ---- 存檔機制 ----
function saveNow() {
  clearTimeout(saveTimer);
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ coreLevels }));
    saveHint.textContent = '已自動儲存';
  } catch (e) {
    saveHint.textContent = '儲存失敗';
  }
}

function scheduleSave() {
  saveHint.textContent = '儲存中…';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveNow, 300);
}

window.addEventListener('beforeunload', saveNow);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') saveNow();
});

function loadAll() {
  CORE_LAYOUT.forEach(c => { coreLevels[c.id] = 0; });
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const loaded = JSON.parse(raw);
      if (loaded.coreLevels) {
        CORE_LAYOUT.forEach(c => {
          if (typeof loaded.coreLevels[c.id] === 'number') {
            coreLevels[c.id] = clampLevel(loaded.coreLevels[c.id]);
          }
        });
      }
    }
  } catch (e) {}
}

// ---- 重設功能（共用函式）----
function resetAllCores() {
  CORE_LAYOUT.forEach(c => { coreLevels[c.id] = 0; });
  saveNow();
  renderAllCores();
}

function refreshCoreCard(id) {
  const config = CORE_LAYOUT.find(c => c.id === id);
  const card = document.querySelector(`.core-card[data-id="${id}"]`);
  if (!config || !card) return;
  const level = coreLevels[id];
  card.querySelector('.core-result').innerHTML = coreResultHtml(config.type, level);
}

function refreshSummary() {
  let totalErda = 0, totalFrag = 0, maxErda = 0, maxFrag = 0;

  CORE_LAYOUT.forEach(({ id, type }) => {
    const used = cumulativeCost(type, coreLevels[id]);
    const max = maxCostCache[type];
    totalErda += used.erda;
    totalFrag += used.frag;
    maxErda += max.erda;
    maxFrag += max.frag;
  });

  const overallPct = (totalErda + totalFrag) / (maxErda + maxFrag) * 100;

  document.getElementById('summary-area').innerHTML = `
    <div class="summary-item se">
      <div class="num">${fmt(totalErda)} / ${fmt(maxErda)}</div>
      <div class="lbl">全部核心已消耗 Sol Erda</div>
    </div>
    <div class="summary-item frag">
      <div class="num">${fmt(totalFrag)} / ${fmt(maxFrag)}</div>
      <div class="lbl">全部核心已消耗 Fragment</div>
    </div>
    <div class="summary-item overall">
      <div class="num">${overallPct.toFixed(1)}%</div>
      <div class="lbl">整體畢業進度</div>
    </div>`;

  document.getElementById('global-progress-bars').innerHTML =
    globalBarBlock('Sol Erda', 'var(--gold)', 'gold', maxErda > 0 ? (totalErda / maxErda) * 100 : 100, `${fmt(totalErda)} / ${fmt(maxErda)}`) +
    globalBarBlock('Sol Erda Fragment', 'var(--violet)', 'violet', maxFrag > 0 ? (totalFrag / maxFrag) * 100 : 100, `${fmt(totalFrag)} / ${fmt(maxFrag)}`) +
    globalBarBlock('總進度', 'var(--teal)', 'teal', overallPct, `${overallPct.toFixed(1)}%`);
}

function renderAllCores() {
  ['tl', 'tr', 'bl', 'br'].forEach(q => {
    const container = document.getElementById('cores-' + q);
    container.innerHTML = CORE_LAYOUT
      .filter(c => c.quadrant === q)
      .map(c => {
        const level = coreLevels[c.id];
        return `<div class="core-card" data-id="${c.id}">
          <div class="core-title">${c.name}</div>
          <div class="field">
            <label>當前等級</label>
            <input type="number" min="0" max="30" step="1"
                   class="core-level level-input" data-id="${c.id}" value="${level}">
          </div>
          <div class="core-result">${coreResultHtml(c.type, level)}</div>
        </div>`;
      }).join('');
  });

  document.querySelectorAll('.core-level').forEach(inp => {
    inp.addEventListener('input', e => {
      const id = e.target.dataset.id;
      coreLevels[id] = clampLevel(parseInt(e.target.value, 10) || 0);
      refreshCoreCard(id);
      refreshSummary();
      scheduleSave();
    });
  });

  refreshSummary();
}

document.getElementById('reset-btn').addEventListener('click', () => {
  const confirmed = confirm('確定要將所有核心等級歸零嗎？此動作無法復原。');
  if (confirmed) {
    resetAllCores();
  }
});

loadAll();
renderAllCores();
</script>
</body>
</html>
