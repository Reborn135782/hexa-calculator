<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>六轉核心進度計算器</title>
<link rel="icon" type="image/png" href="favicon.ico">
<!-- 字體：Cinzel 作為標題/中心符文的顯示字體，Inter 作為內文與小型數字標籤 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=14">
</head>
<body>
<div class="container py-4 app-container">

  <header class="mb-3">
    <h1 class="h4 fw-bold mb-1">六轉核心進度計算器</h1>
    <p class="text-muted small mb-0">點擊星盤上的任一核心，輸入 0～30 等級，即時計算累積消耗與畢業進度</p>
  </header>

  <div class="card shadow-sm mb-3 hexa-plate-card">
    <div class="card-body text-center">
      <h2 class="h6 text-uppercase fw-bold hexa-card-title mb-3">六轉星盤</h2>

      <div class="d-flex justify-content-center">
        <div class="hexa-plate" id="hexaPlateElement">
          <div class="hex-divider d-tl"></div>
          <div class="hex-divider d-tr"></div>
          <div class="hex-divider d-bl"></div>
          <div class="hex-divider d-br"></div>
          <div class="hex-hub-ring" id="hexHubRing">
            <div class="hex-hub">Ⅵ</div>
          </div>
          <!-- 六角格由 script.js 動態產生 -->
        </div>
      </div>

      <div class="hexa-legend d-flex flex-wrap justify-content-center gap-2 mt-3">
        <span class="badge rounded-pill hexa-badge hexa-badge-skill">Skill</span>
        <span class="badge rounded-pill hexa-badge hexa-badge-mastery">Mastery</span>
        <span class="badge rounded-pill hexa-badge hexa-badge-boost">Boost</span>
        <span class="badge rounded-pill hexa-badge hexa-badge-common">Common</span>
        <span class="badge rounded-pill hexa-badge hexa-badge-locked">🔒 未開放</span>
      </div>
      <div class="form-text mt-2">點擊六角格即可輸入 / 修改等級</div>
    </div>
  </div>

  <div class="card shadow-sm mb-3 player-inventory-card">
    <div class="card-body text-center">
      <h2 class="h6 text-uppercase fw-bold inventory-card-title mb-1">✦ 玩家持有資源</h2>
      <p class="inventory-subtitle mb-3">PLAYER INVENTORY</p>

      <div class="row g-3 justify-content-center">
        <div class="col-6 col-sm-5">
          <label class="inventory-label" for="ownedErdaInput"><span class="inventory-icon">🔶</span>Sol Erda</label>
          <div class="input-group inventory-input-group">
            <button type="button" class="btn inventory-step-btn" data-resource="erda" data-step="-1" aria-label="減少 Sol Erda">−</button>
            <input type="number" min="0" step="1" class="form-control inventory-input" id="ownedErdaInput" value="0">
            <button type="button" class="btn inventory-step-btn" data-resource="erda" data-step="1" aria-label="增加 Sol Erda">＋</button>
          </div>
        </div>
        <div class="col-6 col-sm-5">
          <label class="inventory-label" for="ownedFragmentInput"><span class="inventory-icon">🔷</span>Fragment</label>
          <div class="input-group inventory-input-group">
            <button type="button" class="btn inventory-step-btn" data-resource="fragments" data-step="-1" aria-label="減少 Fragment">−</button>
            <input type="number" min="0" step="1" class="form-control inventory-input" id="ownedFragmentInput" value="0">
            <button type="button" class="btn inventory-step-btn" data-resource="fragments" data-step="1" aria-label="增加 Fragment">＋</button>
          </div>
        </div>
      </div>

      <button type="button" class="btn inventory-clear-btn mt-3" id="clearOwnedResourcesButton">清空持有資源</button>
    </div>
  </div>

  <div class="row g-3 mb-3">
    <div class="col-12 col-md-6">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <h2 class="h6 text-uppercase fw-bold text-center progress-card-title mb-3">核心合計進度</h2>
          <div id="overallProgressContainer"></div>
        </div>
      </div>
    </div>
    <div class="col-12 col-md-6">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <h2 class="h6 text-uppercase fw-bold text-center progress-card-title mb-3">核心畢業進度（不含 Janus）</h2>
          <div id="excludingJanusProgressContainer"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="d-flex flex-wrap justify-content-center gap-2 mb-4">
    <button type="button" class="btn btn-outline-gold btn-sm" data-bs-toggle="modal" data-bs-target="#backupModal" id="openBackupModalButton">資料備份</button>
    <button type="button" class="btn btn-danger btn-sm" id="resetAllCoresButton">重設全部核心</button>
  </div>

</div>

<!-- 備份與讀取管理 Modal -->
<div class="modal fade" id="backupModal" tabindex="-1" aria-labelledby="backupModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="backupModalLabel">備份與讀取管理</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="small text-muted">最多可保存 3 組備份，儲存與載入都只影響瀏覽器本機資料。</p>
        <div id="backupSlotListContainer"></div>

        <hr class="my-3">
        <h6 class="backup-section-subtitle text-center mb-2">資料匯出 / 匯入</h6>

        <div class="d-flex justify-content-center mb-2">
          <button type="button" class="btn btn-outline-gold btn-sm" id="exportDataButton">匯出資料</button>
        </div>
        <textarea id="exportedJsonTextarea" class="form-control font-monospace small mb-2 d-none" rows="5" readonly></textarea>
        <div class="d-flex justify-content-center gap-2 mb-2 d-none" id="exportActionButtons">
          <button type="button" class="btn btn-outline-secondary btn-sm" id="copyExportedJsonButton">複製到剪貼簿</button>
          <button type="button" class="btn btn-outline-secondary btn-sm" id="downloadExportedJsonButton">下載 .json 檔案</button>
        </div>
        <div id="copyFeedbackText" class="form-text text-success text-center d-none">已複製到剪貼簿</div>

        <hr class="my-3">

        <label class="form-label small" for="importJsonTextarea">貼上先前匯出的 JSON 內容，或上傳檔案：</label>
        <textarea id="importJsonTextarea" class="form-control font-monospace small mb-2" rows="5" placeholder='{"coreLevels": {...}, "ownedResources": {...}}'></textarea>
        <input type="file" id="importFileInput" accept=".json,application/json" class="form-control form-control-sm mb-2">
        <div id="importErrorAlert" class="alert alert-danger py-2 small d-none"></div>
        <div id="importSuccessText" class="text-success small text-center mb-2 d-none">✔ 匯入成功，星盤與進度已更新</div>
        <div class="d-flex justify-content-center">
          <button type="button" class="btn btn-primary btn-sm" id="confirmImportButton">確認匯入</button>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">關閉</button>
      </div>
    </div>
  </div>
</div>

<!-- 六角格點擊編輯用的微型輸入框（由 script.js 動態插入定位） -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
